<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Альба">
<title>Альба</title>
<style>
  * {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    min-height: 100vh;
    background: #1a1410;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    color: #f0e6d3;
    overflow: hidden;
  }

  .app-title {
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: #c9a86a;
    margin-bottom: 12px;
    font-weight: normal;
  }

  .app-subtitle {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: #7a6a55;
    margin-bottom: 60px;
    text-transform: uppercase;
  }

  .btn-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 50px;
  }

  .btn-ring {
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 1px solid rgba(201, 168, 106, 0.2);
    animation: pulse-ring 2.5s ease-out infinite;
    pointer-events: none;
  }

  .btn-ring:nth-child(2) { animation-delay: 0.8s; }
  .btn-ring:nth-child(3) { animation-delay: 1.6s; }

  @keyframes pulse-ring {
    0%   { transform: scale(0.85); opacity: 0.6; }
    100% { transform: scale(1.4);  opacity: 0; }
  }

  #mainBtn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid #c9a86a;
    background: radial-gradient(circle at 40% 35%, #2e2418, #1a1410);
    box-shadow:
      0 0 30px rgba(201, 168, 106, 0.15),
      inset 0 1px 0 rgba(201, 168, 106, 0.3),
      inset 0 -1px 0 rgba(0,0,0,0.5);
    cursor: pointer;
    position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    touch-action: none;
    -webkit-touch-callout: none;
  }

  #mainBtn:active,
  #mainBtn.pressing {
    transform: scale(0.94);
    box-shadow:
      0 0 50px rgba(201, 168, 106, 0.35),
      inset 0 1px 0 rgba(201, 168, 106, 0.3),
      inset 0 -1px 0 rgba(0,0,0,0.5);
  }

  #mainBtn.recording {
    border-color: #e05555;
    box-shadow:
      0 0 40px rgba(224, 85, 85, 0.4),
      inset 0 1px 0 rgba(255,100,100, 0.3),
      inset 0 -1px 0 rgba(0,0,0,0.5);
    animation: rec-pulse 1s ease-in-out infinite alternate;
  }

  @keyframes rec-pulse {
    from { box-shadow: 0 0 20px rgba(224,85,85,0.3), inset 0 1px 0 rgba(255,100,100,0.3); }
    to   { box-shadow: 0 0 60px rgba(224,85,85,0.6), inset 0 1px 0 rgba(255,100,100,0.3); }
  }

  #mainBtn.thinking {
    border-color: #c9a86a;
    animation: think-rotate 2s linear infinite;
  }

  @keyframes think-rotate {
    from { box-shadow: 0 0 30px rgba(201,168,106,0.2), 0 0 0 0 rgba(201,168,106,0.3); }
    to   { box-shadow: 0 0 50px rgba(201,168,106,0.5), 0 0 0 0 rgba(201,168,106,0); }
  }

  .btn-icon {
    font-size: 2.5rem;
    pointer-events: none;
  }

  .status {
    font-size: 0.9rem;
    color: #7a6a55;
    letter-spacing: 0.1em;
    min-height: 24px;
    text-align: center;
    padding: 0 20px;
    transition: color 0.3s;
  }

  .status.active { color: #c9a86a; }
  .status.error  { color: #e05555; }

  /* Последнее сообщение */
  .last-message {
    margin-top: 30px;
    max-width: 320px;
    text-align: center;
    font-size: 0.9rem;
    color: #9a8a75;
    line-height: 1.6;
    min-height: 48px;
    padding: 0 24px;
    font-style: italic;
  }

  /* Панель настроек */
  .settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .settings-overlay.open {
    display: flex;
  }

  .settings-panel {
    background: #241d14;
    border: 1px solid #3a3020;
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 480px;
  }

  .settings-panel h3 {
    color: #c9a86a;
    font-size: 1rem;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
    font-weight: normal;
    text-transform: uppercase;
  }

  .settings-panel label {
    display: block;
    font-size: 0.8rem;
    color: #7a6a55;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .settings-panel input {
    width: 100%;
    background: #1a1410;
    border: 1px solid #3a3020;
    border-radius: 8px;
    padding: 12px 14px;
    color: #f0e6d3;
    font-size: 0.85rem;
    margin-bottom: 20px;
    outline: none;
    font-family: monospace;
  }

  .settings-panel input:focus {
    border-color: #c9a86a;
  }

  .settings-buttons {
    display: flex;
    gap: 12px;
  }

  .btn-save {
    flex: 1;
    background: #c9a86a;
    color: #1a1410;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: 'Georgia', serif;
    letter-spacing: 0.05em;
  }

  .btn-cancel {
    flex: 1;
    background: transparent;
    color: #7a6a55;
    border: 1px solid #3a3020;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: 'Georgia', serif;
  }

  .hint {
    margin-top: 40px;
    font-size: 0.75rem;
    color: #3a3020;
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* Индикатор уровня звука */
  .audio-bars {
    display: none;
    gap: 4px;
    align-items: flex-end;
    height: 30px;
    margin-bottom: 12px;
  }

  .audio-bars.visible { display: flex; }

  .bar {
    width: 4px;
    background: #e05555;
    border-radius: 2px;
    min-height: 4px;
    transition: height 0.1s;
  }

  .no-support {
    background: #2a1a1a;
    border: 1px solid #e05555;
    border-radius: 12px;
    padding: 20px;
    max-width: 300px;
    text-align: center;
    font-size: 0.85rem;
    color: #e05555;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="app-title">АЛЬБА</div>
<div class="app-subtitle">ассистент</div>

<div class="btn-wrap">
  <div class="btn-ring"></div>
  <div class="btn-ring"></div>
  <div class="btn-ring"></div>
  <button id="mainBtn" aria-label="Говорить с Альбой">
    <span class="btn-icon" id="btnIcon">🎙</span>
  </button>
</div>

<div class="audio-bars" id="audioBars">
  <div class="bar" id="b1"></div>
  <div class="bar" id="b2"></div>
  <div class="bar" id="b3"></div>
  <div class="bar" id="b4"></div>
  <div class="bar" id="b5"></div>
</div>

<div class="status" id="status">Нажми и говори</div>
<div class="last-message" id="lastMessage"></div>

<div class="hint" id="hint">удержи 2 сек для настроек</div>

<!-- Панель настроек -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h3>Настройки</h3>
    <label>Webhook URL (n8n)</label>
    <input type="url" id="webhookInput" placeholder="https://ваш-сервер/webhook/alba">
    <div class="settings-buttons">
      <button class="btn-save" id="btnSave">Сохранить</button>
      <button class="btn-cancel" id="btnCancel">Отмена</button>
    </div>
  </div>
</div>

<script>
// ─── КОНФИГ ──────────────────────────────────────────────
const STORAGE_KEY = 'alba_webhook_url';
let webhookUrl = localStorage.getItem(STORAGE_KEY) || '';

// ─── ЭЛЕМЕНТЫ ────────────────────────────────────────────
const btn         = document.getElementById('mainBtn');
const btnIcon     = document.getElementById('btnIcon');
const statusEl    = document.getElementById('status');
const lastMsg     = document.getElementById('lastMessage');
const overlay     = document.getElementById('settingsOverlay');
const webhookInp  = document.getElementById('webhookInput');
const audioBars   = document.getElementById('audioBars');

// ─── СОСТОЯНИЯ ───────────────────────────────────────────
let isRecording   = false;
let mediaRecorder = null;
let audioChunks   = [];
let pressTimer    = null;
let longPressTriggered = false;
let audioCtx      = null;
let analyser      = null;
let animFrame     = null;

// ─── СТАТУС ──────────────────────────────────────────────
function setStatus(text, type = '') {
  statusEl.textContent = text;
  statusEl.className = 'status ' + type;
}

// ─── НАСТРОЙКИ ───────────────────────────────────────────
document.getElementById('btnSave').addEventListener('click', () => {
  webhookUrl = webhookInp.value.trim();
  localStorage.setItem(STORAGE_KEY, webhookUrl);
  overlay.classList.remove('open');
  setStatus('URL сохранён', 'active');
  setTimeout(() => setStatus('Нажми и говори'), 2000);
});

document.getElementById('btnCancel').addEventListener('click', () => {
  overlay.classList.remove('open');
});

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.remove('open');
});

function openSettings() {
  webhookInp.value = webhookUrl;
  overlay.classList.add('open');
  webhookInp.focus();
}

// ─── АНАЛИЗ ЗВУКА (визуализация) ─────────────────────────
function startVisualizer(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 32;
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);

  const bars = [
    document.getElementById('b1'),
    document.getElementById('b2'),
    document.getElementById('b3'),
    document.getElementById('b4'),
    document.getElementById('b5'),
  ];

  const dataArr = new Uint8Array(analyser.frequencyBinCount);

  function draw() {
    animFrame = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArr);
    bars.forEach((bar, i) => {
      const val = dataArr[i * 2] || 0;
      bar.style.height = Math.max(4, val / 3) + 'px';
    });
  }
  audioBars.classList.add('visible');
  draw();
}

function stopVisualizer() {
  if (animFrame) cancelAnimationFrame(animFrame);
  audioBars.classList.remove('visible');
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

// ─── ЗАПИСЬ ──────────────────────────────────────────────
async function startRecording() {
  if (!webhookUrl) {
    setStatus('Сначала настрой webhook URL', 'error');
    setTimeout(openSettings, 800);
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: getAudioMime() });

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      stopVisualizer();
      sendAudio();
    };

    mediaRecorder.start();
    startVisualizer(stream);

    isRecording = true;
    btn.classList.add('recording');
    btnIcon.textContent = '⏹';
    setStatus('Говори...', 'active');

  } catch(err) {
    setStatus('Нет доступа к микрофону', 'error');
    console.error(err);
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    btn.classList.remove('recording');
    btn.classList.add('thinking');
    btnIcon.textContent = '⏳';
    setStatus('Обрабатываю...', 'active');
  }
}

function getAudioMime() {
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', 'audio/mp4'];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
}

// ─── ОТПРАВКА НА N8N ─────────────────────────────────────
async function sendAudio() {
  if (!audioChunks.length) {
    resetBtn();
    return;
  }

  const blob = new Blob(audioChunks, { type: getAudioMime() || 'audio/webm' });
  const formData = new FormData();
  formData.append('audio', blob, 'voice.webm');
  formData.append('timestamp', new Date().toISOString());

  try {
    const res = await fetch(webhookUrl, {
      method: 'POST',
      body: formData
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();
    const replyText = data.reply || data.text || data.message || JSON.stringify(data);

    lastMsg.textContent = replyText;
    setStatus('Ответ получен', 'active');
    speak(replyText);

  } catch(err) {
    setStatus('Ошибка соединения', 'error');
    console.error('Ошибка:', err);
  } finally {
    resetBtn();
  }
}

// ─── ОЗВУЧКА ОТВЕТА ──────────────────────────────────────
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ru-RU';
  utt.rate = 0.95;
  utt.pitch = 1.0;

  // Выбрать русский голос если есть
  const voices = window.speechSynthesis.getVoices();
  const ruVoice = voices.find(v => v.lang.startsWith('ru'));
  if (ruVoice) utt.voice = ruVoice;

  window.speechSynthesis.speak(utt);
}

// Голоса грузятся асинхронно
window.speechSynthesis.onvoiceschanged = () => {};

// ─── СБРОС КНОПКИ ────────────────────────────────────────
function resetBtn() {
  btn.classList.remove('recording', 'thinking', 'pressing');
  btnIcon.textContent = '🎙';
  setTimeout(() => {
    if (!isRecording) setStatus('Нажми и говори');
  }, 2000);
}

// ─── СОБЫТИЯ КНОПКИ ──────────────────────────────────────
// Блокируем контекстное меню на кнопке
btn.addEventListener('contextmenu', e => {
  e.preventDefault();
  e.stopPropagation();
  return false;
});

// Touch events
btn.addEventListener('touchstart', e => {
  e.preventDefault();
  longPressTriggered = false;
  btn.classList.add('pressing');

  pressTimer = setTimeout(() => {
    longPressTriggered = true;
    btn.classList.remove('pressing');
    openSettings();
  }, 2000);
}, { passive: false });

btn.addEventListener('touchend', e => {
  e.preventDefault();
  clearTimeout(pressTimer);
  btn.classList.remove('pressing');

  if (longPressTriggered) return;

  if (!isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
}, { passive: false });

btn.addEventListener('touchmove', e => {
  e.preventDefault();
  clearTimeout(pressTimer);
  btn.classList.remove('pressing');
}, { passive: false });

// Mouse events (для теста на компьютере)
btn.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  longPressTriggered = false;
  pressTimer = setTimeout(() => {
    longPressTriggered = true;
    openSettings();
  }, 2000);
});

btn.addEventListener('mouseup', e => {
  if (e.button !== 0) return;
  clearTimeout(pressTimer);
  if (longPressTriggered) return;

  if (!isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
});

// ─── ПРОВЕРКА ПОДДЕРЖКИ ──────────────────────────────────
window.addEventListener('load', () => {
  if (!navigator.mediaDevices || !window.MediaRecorder) {
    document.body.innerHTML = `
      <div class="no-support">
        Используй Chrome или браузер на Android.<br><br>
        Safari на iPhone не поддерживает запись аудио в PWA.
      </div>`;
  }

  // Если URL уже сохранён — показать подсказку
  if (!webhookUrl) {
    setStatus('Сначала настрой webhook', 'error');
    document.getElementById('hint').style.color = '#c9a86a';
  }
});
</script>
</body>
</html>
